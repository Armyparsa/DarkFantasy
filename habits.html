<!doctype html>
<html lang="fa" data-theme="ember">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mt. Gelmir — Habits</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .hero-bg { background-image: url('https://images.pexels.com/photos/158163/clouds-cloudporn-weather-lookup-158163.jpeg?auto=compress&cs=tinysrgb&w=1920'); }

    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(6px);
      z-index: 500; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg-card); border: 1px solid var(--border);
      padding: 2rem; width: 100%; max-width: 440px; margin: 1rem;
    }
    .modal h3 {
      font-family: var(--font-title); font-size: 0.8rem; letter-spacing: 3px;
      text-transform: uppercase; color: var(--gold); margin-bottom: 1.5rem;
    }
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block; font-family: var(--font-title); font-size: 0.65rem;
      letter-spacing: 2px; text-transform: uppercase; color: var(--ash); margin-bottom: 0.4rem;
    }
    .form-group input {
      width: 100%; background: var(--bg-deep); border: 1px solid var(--border);
      color: var(--light); font-family: var(--font-body); font-size: 0.95rem;
      padding: 0.65rem 0.9rem; outline: none; transition: border-color 0.3s;
    }
    .form-group input:focus { border-color: var(--gold-dim); }
    .modal-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
    .btn-cancel { border-color: var(--mist); color: var(--ash); }

    .habit-streak {
      font-family: var(--font-display); font-size: 1.1rem;
      color: var(--gold); margin-left: 0.5rem;
    }
    .action-btn {
      background: none; border: none; cursor: pointer; padding: 0.25rem 0.5rem;
      font-size: 0.8rem; transition: color 0.2s; color: var(--ash);
    }
    .action-btn:hover { color: var(--gold); }
    .action-btn.delete:hover { color: var(--ember-bright); }
    .checked-today { color: var(--gold) !important; }
  </style>
</head>
<body>
<canvas id="particles-canvas"></canvas>

<header class="header">
  <div class="header-content">
    <a href="index.html" class="logo">
      <div class="logo-icon"><i class="fas fa-fire"></i></div>
      Mt. Gelmir
    </a>
    <nav class="navbar">
      <a href="index.html"><i class="fas fa-home"></i> Home</a>
      <a href="todo.html"><i class="fas fa-list-check"></i> Todo</a>
      <a href="habits.html" class="active"><i class="fas fa-fire"></i> Habits</a>
      <a href="budget.html"><i class="fas fa-coins"></i> Budget</a>
      <a href="diary.html"><i class="fas fa-scroll"></i> Diary</a>
      <a href="books.html"><i class="fas fa-book"></i> Books</a>
      <a href="developer.html"><i class="fas fa-code"></i> Dev</a>
    </nav>
    <div class="hamburger" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
  </div>
</header>

<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="hero-eyebrow">Mt. Gelmir</div>
    <h1>Flames of Habit</h1>
    <p>Forge your discipline in the fires of commitment...</p>
  </div>
</section>

<section class="section" style="max-width:860px">
  <div class="section-title">Your Flames</div>
  <div class="card">
    <div class="card-header">
      <div class="card-header-icon"><i class="fas fa-fire"></i></div>
      <h2>Active Habits</h2>
    </div>
    <div class="card-body" id="habitList">
      <p class="empty">No habits forged yet...</p>
    </div>
    <div style="padding: 0 1.5rem 1.5rem">
      <button class="btn" onclick="openModal()" style="width:100%">
        <i class="fas fa-plus"></i> <span>Forge New Habit</span>
      </button>
    </div>
  </div>
</section>

<footer class="footer">
  <div class="footer-bottom" style="max-width:860px; border:none; padding-top:0">
    <p>Mt. Gelmir &copy; 2025 — Dark Chronicle</p>
    <p><a href="index.html" style="color:var(--ash); text-decoration:none">Back to Chronicle</a></p>
  </div>
</footer>

<div class="modal-overlay" id="habitModal">
  <div class="modal">
    <h3>Forge Habit</h3>
    <div class="form-group">
      <label>Habit Name</label>
      <input type="text" id="habitName" placeholder="What will you forge..." />
    </div>
    <div class="form-group">
      <label>Description (optional)</label>
      <input type="text" id="habitDesc" placeholder="Brief description..." />
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="submitHabit()"><span>Forge</span></button>
      <button class="btn btn-cancel" onclick="closeModal()"><span>Cancel</span></button>
    </div>
  </div>
</div>

<script src="js/habits.js"></script>
<script src="js/shared.js"></script>
<script>
  loadHabits();

  function openModal() {
    document.getElementById('habitModal').classList.add('open');
    setTimeout(() => document.getElementById('habitName').focus(), 100);
  }
  function closeModal() {
    document.getElementById('habitModal').classList.remove('open');
    document.getElementById('habitName').value = '';
    document.getElementById('habitDesc').value = '';
  }
  function submitHabit() {
    const name = document.getElementById('habitName').value.trim();
    if (!name) return;
    const desc = document.getElementById('habitDesc').value.trim();
    addHabit(name, desc);
    habits = JSON.parse(localStorage.getItem('dc_habits') || '[]');
    closeModal(); render();
  }

  function render() {
    const c = document.getElementById('habitList');
    habits = JSON.parse(localStorage.getItem('dc_habits') || '[]');
    const today = new Date().toISOString().split('T')[0];
    if (!habits.length) { c.innerHTML = '<p class="empty">No habits forged yet...</p>'; return; }
    c.innerHTML = habits.map(h => {
      const checkedToday = h.history && h.history.includes(today);
      return `
      <div class="list-item">
        <span class="title">${h.name}</span>
        <div style="display:flex;align-items:center;gap:0.75rem">
          <span class="habit-streak">${h.history ? h.history.length : 0}</span>
          <span class="status">days</span>
          <button class="action-btn ${checkedToday ? 'checked-today' : ''}" onclick="doCheck(${h.id})" title="${checkedToday ? 'Already done today' : 'Check in for today'}">
            <i class="fas ${checkedToday ? 'fa-circle-check' : 'fa-circle'}"></i>
          </button>
          <button class="action-btn delete" onclick="remove(${h.id})"><i class="fas fa-trash"></i></button>
        </div>
      </div>`}).join('');
  }

  function doCheck(id) { checkHabit(id); habits = JSON.parse(localStorage.getItem('dc_habits') || '[]'); render(); }
  function remove(id) { deleteHabit(id); habits = JSON.parse(localStorage.getItem('dc_habits') || '[]'); render(); }

  document.addEventListener('DOMContentLoaded', render);
  document.getElementById('habitModal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
</script>
</body>
</html>
