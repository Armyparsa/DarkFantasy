<!doctype html>
<html lang="fa" data-theme="arcane">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raya Lucaria — Diary</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .hero-bg { background-image: url('https://images.pexels.com/photos/355465/pexels-photo-355465.jpeg?auto=compress&cs=tinysrgb&w=1920'); }

    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(6px);
      z-index: 500; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg-card); border: 1px solid var(--border);
      padding: 2rem; width: 100%; max-width: 520px; margin: 1rem;
    }
    .modal h3 {
      font-family: var(--font-title); font-size: 0.8rem; letter-spacing: 3px;
      text-transform: uppercase; color: var(--gold); margin-bottom: 1.5rem;
    }
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block; font-family: var(--font-title); font-size: 0.65rem;
      letter-spacing: 2px; text-transform: uppercase; color: var(--ash); margin-bottom: 0.4rem;
    }
    .form-group input, .form-group textarea {
      width: 100%; background: var(--bg-deep); border: 1px solid var(--border);
      color: var(--light); font-family: var(--font-body); font-size: 0.95rem;
      padding: 0.65rem 0.9rem; outline: none; transition: border-color 0.3s; resize: vertical;
    }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--gold-dim); }
    .modal-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
    .btn-cancel { border-color: var(--mist); color: var(--ash); }

    .action-btn {
      background: none; border: none; cursor: pointer; padding: 0.25rem 0.5rem;
      font-size: 0.8rem; transition: color 0.2s; color: var(--ash);
    }
    .action-btn:hover { color: var(--ember-bright); }

    .entry-preview {
      font-size: 0.82rem; color: var(--ash); font-style: italic;
      margin-top: 0.2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .list-item { flex-direction: column; align-items: flex-start; gap: 0.3rem; }
    .list-item-row { width: 100%; display: flex; justify-content: space-between; align-items: center; }
  </style>
</head>
<body>
<canvas id="particles-canvas"></canvas>

<header class="header">
  <div class="header-content">
    <a href="index.html" class="logo">
      <div class="logo-icon"><i class="fas fa-hat-wizard"></i></div>
      Raya Lucaria
    </a>
    <nav class="navbar">
      <a href="index.html"><i class="fas fa-home"></i> Home</a>
      <a href="todo.html"><i class="fas fa-list-check"></i> Todo</a>
      <a href="habits.html"><i class="fas fa-fire"></i> Habits</a>
      <a href="budget.html"><i class="fas fa-coins"></i> Budget</a>
      <a href="diary.html" class="active"><i class="fas fa-scroll"></i> Diary</a>
      <a href="books.html"><i class="fas fa-book"></i> Books</a>
      <a href="developer.html"><i class="fas fa-code"></i> Dev</a>
    </nav>
    <div class="hamburger" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
  </div>
</header>

<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="hero-eyebrow">Raya Lucaria</div>
    <h1>Ancient Scrolls</h1>
    <p>Write your own sorceries into the annals...</p>
  </div>
</section>

<section class="section" style="max-width:860px">
  <div class="section-title">The Scrolls</div>
  <div class="card">
    <div class="card-header">
      <div class="card-header-icon"><i class="fas fa-scroll"></i></div>
      <h2>Diary Entries</h2>
    </div>
    <div class="card-body" id="diaryList">
      <p class="empty">No scrolls written yet...</p>
    </div>
    <div style="padding: 0 1.5rem 1.5rem">
      <button class="btn" onclick="openModal()" style="width:100%">
        <i class="fas fa-plus"></i> <span>Write Scroll</span>
      </button>
    </div>
  </div>
</section>

<footer class="footer">
  <div class="footer-bottom" style="max-width:860px; border:none; padding-top:0">
    <p>Raya Lucaria &copy; 2025 — Dark Chronicle</p>
    <p><a href="index.html" style="color:var(--ash); text-decoration:none">Back to Chronicle</a></p>
  </div>
</footer>

<div class="modal-overlay" id="diaryModal">
  <div class="modal">
    <h3>Write Scroll</h3>
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="entryTitle" placeholder="Scroll title..." />
    </div>
    <div class="form-group">
      <label>Date</label>
      <input type="date" id="entryDate" />
    </div>
    <div class="form-group">
      <label>Your Story</label>
      <textarea id="entryContent" rows="5" placeholder="Write your tale..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="submitEntry()"><span>Inscribe</span></button>
      <button class="btn btn-cancel" onclick="closeModal()"><span>Cancel</span></button>
    </div>
  </div>
</div>

<script src="js/diary.js"></script>
<script src="js/shared.js"></script>
<script>
  loadDiary();

  function openModal() {
    document.getElementById('diaryModal').classList.add('open');
    document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];
    setTimeout(() => document.getElementById('entryTitle').focus(), 100);
  }
  function closeModal() {
    document.getElementById('diaryModal').classList.remove('open');
    document.getElementById('entryTitle').value = '';
    document.getElementById('entryContent').value = '';
  }
  function submitEntry() {
    const title = document.getElementById('entryTitle').value.trim();
    const content = document.getElementById('entryContent').value.trim();
    if (!title || !content) return;
    const date = document.getElementById('entryDate').value;
    addEntry(title, content, date);
    diaries = JSON.parse(localStorage.getItem('dc_diary') || '[]');
    closeModal(); render();
  }

  function render() {
    const c = document.getElementById('diaryList');
    diaries = JSON.parse(localStorage.getItem('dc_diary') || '[]');
    if (!diaries.length) { c.innerHTML = '<p class="empty">No scrolls written yet...</p>'; return; }
    c.innerHTML = [...diaries].reverse().map(d => `
      <div class="list-item">
        <div class="list-item-row">
          <span class="title">${d.title}</span>
          <div style="display:flex;align-items:center;gap:0.5rem">
            <span class="status">${d.date}</span>
            <button class="action-btn" onclick="remove(${d.id})"><i class="fas fa-trash"></i></button>
          </div>
        </div>
        <div class="entry-preview">${d.content}</div>
      </div>`).join('');
  }

  function remove(id) { deleteEntry(id); diaries = JSON.parse(localStorage.getItem('dc_diary') || '[]'); render(); }

  document.addEventListener('DOMContentLoaded', render);
  document.getElementById('diaryModal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
</script>
</body>
</html>
