<!doctype html>
<html lang="fa" data-theme="rot">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caelid — Books</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      .hero-bg {
        background-image: url("https://images.pexels.com/photos/1576937/pexels-photo-1576937.jpeg?auto=compress&cs=tinysrgb&w=1920");
      }

      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(6px);
        z-index: 500;
        align-items: center;
        justify-content: center;
      }
      .modal-overlay.open {
        display: flex;
      }
      .modal {
        background: var(--bg-card);
        border: 1px solid var(--border);
        padding: 2rem;
        width: 100%;
        max-width: 440px;
        margin: 1rem;
      }
      .modal h3 {
        font-family: var(--font-title);
        font-size: 0.8rem;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--gold);
        margin-bottom: 1.5rem;
      }
      .form-group {
        margin-bottom: 1rem;
      }
      .form-group label {
        display: block;
        font-family: var(--font-title);
        font-size: 0.65rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--ash);
        margin-bottom: 0.4rem;
      }
      .form-group input,
      .form-group select {
        width: 100%;
        background: var(--bg-deep);
        border: 1px solid var(--border);
        color: var(--light);
        font-family: var(--font-body);
        font-size: 0.95rem;
        padding: 0.65rem 0.9rem;
        outline: none;
        transition: border-color 0.3s;
      }
      .form-group input:focus,
      .form-group select:focus {
        border-color: var(--gold-dim);
      }
      .form-group select option {
        background: var(--bg-card);
      }
      .modal-actions {
        display: flex;
        gap: 0.75rem;
        margin-top: 1.5rem;
      }
      .btn-cancel {
        border-color: var(--mist);
        color: var(--ash);
      }

      .action-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: 0.25rem 0.5rem;
        font-size: 0.8rem;
        transition: color 0.2s;
        color: var(--ash);
      }
      .action-btn:hover {
        color: var(--ember-bright);
      }
      .status-read {
        color: #7aaa7a !important;
      }
      .status-reading {
        color: var(--gold) !important;
      }
      .status-unread {
        color: var(--ash) !important;
      }

      .list-item .book-info {
        display: flex;
        flex-direction: column;
        flex: 1;
      }
      .book-author {
        font-size: 0.8rem;
        color: var(--ash);
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <canvas id="particles-canvas"></canvas>

    <header class="header">
      <div class="header-content">
        <a href="index.html" class="logo">
          <div class="logo-icon"><i class="fas fa-skull-crossbones"></i></div>
          Caelid
        </a>
        <nav class="navbar">
          <a href="index.html"><i class="fas fa-home"></i> Home</a>
          <a href="todo.html"><i class="fas fa-list-check"></i> Todo</a>
          <a href="habits.html"><i class="fas fa-fire"></i> Habits</a>
          <a href="budget.html"><i class="fas fa-coins"></i> Budget</a>
          <a href="diary.html"><i class="fas fa-scroll"></i> Diary</a>
          <a href="books.html" class="active"
            ><i class="fas fa-book"></i> Books</a
          >
          <a href="developer.html"><i class="fas fa-code"></i> Dev</a>
        </nav>
        <div class="hamburger" onclick="toggleMenu()">
          <i class="fas fa-bars"></i>
        </div>
      </div>
    </header>

    <section class="hero">
      <div class="hero-bg"></div>
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <div class="hero-eyebrow">Caelid</div>
        <h1>Forbidden Tomes</h1>
        <p>Knowledge is a curse in the land of rot...</p>
      </div>
    </section>

    <section class="section" style="max-width: 860px">
      <div class="section-title">Your Library</div>
      <div class="card">
        <div class="card-header">
          <div class="card-header-icon"><i class="fas fa-book"></i></div>
          <h2>Discovered Tomes</h2>
        </div>
        <div class="card-body" id="bookList">
          <p class="empty">No tomes discovered yet...</p>
        </div>
        <div style="padding: 0 1.5rem 1.5rem">
          <button class="btn" onclick="openModal()" style="width: 100%">
            <i class="fas fa-plus"></i> <span>Add Tome</span>
          </button>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div
        class="footer-bottom"
        style="max-width: 860px; border: none; padding-top: 0"
      >
        <p>Caelid &copy; 2025 — Dark Chronicle</p>
        <p>
          <a href="index.html" style="color: var(--ash); text-decoration: none"
            >Back to Chronicle</a
          >
        </p>
      </div>
    </footer>

    <div class="modal-overlay" id="bookModal">
      <div class="modal">
        <h3>Add Tome</h3>
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="bookTitle" placeholder="Book title..." />
        </div>
        <div class="form-group">
          <label>Author</label>
          <input type="text" id="bookAuthor" placeholder="Author name..." />
        </div>
        <div class="form-group">
          <label>Genre</label>
          <input type="text" id="bookGenre" placeholder="Fantasy, Sci-fi..." />
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="bookStatus">
            <option value="unread">Unread</option>
            <option value="reading">Reading</option>
            <option value="read">Read</option>
          </select>
        </div>
        <div class="modal-actions">
          <button class="btn" onclick="submitBook()"><span>Add</span></button>
          <button class="btn btn-cancel" onclick="closeModal()">
            <span>Cancel</span>
          </button>
        </div>
      </div>
    </div>

    <script src="js/books.js"></script>
    <script src="js/shared.js"></script>
    <script>
      loadBooks();

      function openModal() {
        document.getElementById("bookModal").classList.add("open");
        setTimeout(() => document.getElementById("bookTitle").focus(), 100);
      }
      function closeModal() {
        document.getElementById("bookModal").classList.remove("open");
        document.getElementById("bookTitle").value = "";
        document.getElementById("bookAuthor").value = "";
        document.getElementById("bookGenre").value = "";
      }
      function submitBook() {
        const title = document.getElementById("bookTitle").value.trim();
        if (!title) return;
        const author =
          document.getElementById("bookAuthor").value.trim() || "Unknown";
        const genre =
          document.getElementById("bookGenre").value.trim() || "Unknown";
        const status = document.getElementById("bookStatus").value;
        addBooks(title, author, new Date().getFullYear(), genre, status);
        books = JSON.parse(localStorage.getItem("dc_books") || "[]");
        closeModal();
        render();
      }

      function render() {
        const c = document.getElementById("bookList");
        books = JSON.parse(localStorage.getItem("dc_books") || "[]");
        if (!books.length) {
          c.innerHTML = '<p class="empty">No tomes discovered yet...</p>';
          return;
        }
        c.innerHTML = books
          .map(
            (b) => `
      <div class="list-item">
        <div class="book-info">
          <span class="title">${b.title}</span>
          <span class="book-author">${b.author} &middot; ${b.genre}</span>
        </div>
        <div style="display:flex;align-items:center;gap:0.5rem">
          <span class="status status-${b.status}">${b.status}</span>
          <button class="action-btn" onclick="remove(${b.id})"><i class="fas fa-trash"></i></button>
        </div>
      </div>`,
          )
          .join("");
      }

      function remove(id) {
        deleteBook(id);
        books = JSON.parse(localStorage.getItem("dc_books") || "[]");
        render();
      }

      document.addEventListener("DOMContentLoaded", render);
      document
        .getElementById("bookModal")
        .addEventListener("click", function (e) {
          if (e.target === this) closeModal();
        });
      window.toggeleMenu = function () {
        document.querySelector(".navbar").classList.toggle("opne");
      };
    </script>
  </body>
</html>
